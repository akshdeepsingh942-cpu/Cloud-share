<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShare - Free File Sharing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .upload-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 450px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .drop-zone { border: 2px dashed #007bff; border-radius: 8px; padding: 40px 20px; cursor: pointer; background: #f8fbff; }
        #fileInput { display: none; }
        .upload-btn { margin-top: 20px; background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: 600; }
        #status { margin-top: 15px; font-size: 14px; word-break: break-all; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>CloudShare</h2>
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <p>Click to browse your file (Up to 1GB)</p>
        <input type="file" id="fileInput">
    </div>
    <button class="upload-btn" onclick="uploadFile()">Upload File</button>
    <div id="status"></div>
</div>

<script>
    function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'Please select a file first!';
            return;
        }

        const file = fileInput.files[0];
        statusDiv.style.color = '#007bff';
        statusDiv.innerText = `Uploading ${file.name}...`;

        const formData = new FormData();
        formData.append('file', file);

        // Pointing exactly to your live backend server
        fetch('https://cloud-share-b0oa.onrender.com/upload', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            statusDiv.style.color = '#28a745';
            statusDiv.innerHTML = `Success! Share Link: <br><a href="${data.downloadLink}" target="_blank">${data.downloadLink}</a>`;
        })
        .catch(err => {
            statusDiv.style.color = 'red';
            statusDiv.innerText = 'Upload failed. Check your connection or server logs.';
            console.error(err);
        });
    }
</script>

</body>
</html>
